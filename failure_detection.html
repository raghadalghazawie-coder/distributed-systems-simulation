<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكاة الأنظمة الموزعة: كشف الأخطاء (Failure Detection)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .heartbeat { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 mb-2">محاكاة كشف الأخطاء (Failure Detection)</h1>
        <p class="text-slate-400">نظام نبضات القلب (Heartbeat) لمراقبة صحة الخوادم تلقائياً</p>
    </header>

    <main class="max-w-5xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
        <div id="nodesContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- سيتم توليد الخوادم هنا برمجياً -->
        </div>

        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 font-mono text-xs text-emerald-400 h-40 overflow-y-auto" id="logPanel">
            <div>[نظام المراقبة] بدء التشغيل... انتظار نبضات القلب من جميع الخوادم.</div>
        </div>
    </main>

    <script>
        const nodes = [
            { id: 1, name: "الخادم الأول", active: true, lastHeartbeat: Date.now() },
            { id: 2, name: "الخادم الثاني", active: true, lastHeartbeat: Date.now() },
            { id: 3, name: "الخادم الثالث", active: true, lastHeartbeat: Date.now() }
        ];

        function updateUI() {
            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border ${node.active ? 'border-teal-500 bg-teal-950/20' : 'border-rose-500 bg-rose-950/20'} flex flex-col items-center`;
                div.innerHTML = `
                    <i class="fas fa-server text-2xl ${node.active ? 'text-teal-400' : 'text-rose-400'} mb-2"></i>
                    <h3 class="font-bold">${node.name}</h3>
                    <span class="text-xs ${node.active ? 'text-teal-400' : 'text-rose-400'}">${node.active ? 'يعمل' : 'معطل'}</span>
                    <button onclick="toggleNode(${node.id})" class="mt-4 px-3 py-1 bg-slate-800 rounded text-[10px] hover:bg-slate-700">
                        ${node.active ? 'إيقاف الخادم' : 'إعادة تشغيل'}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function toggleNode(id) {
            const node = nodes.find(n => n.id === id);
            node.active = !node.active;
            node.lastHeartbeat = Date.now();
            updateUI();
            log(`[المستخدم] تم تغيير حالة ${node.name} إلى ${node.active ? 'نشط' : 'معطل'}`);
        }

        function log(msg) {
            const panel = document.getElementById('logPanel');
            panel.innerHTML += `<div>${new Date().toLocaleTimeString()} ${msg}</div>`;
            panel.scrollTop = panel.scrollHeight;
        }

        // حلقة المراقبة
        setInterval(() => {
            nodes.forEach(node => {
                if (node.active) {
                    node.lastHeartbeat = Date.now();
                } else {
                    if (Date.now() - node.lastHeartbeat > 3000) {
                        log(`[تحذير] لم يتم استقبال نبضة قلب من ${node.name}!`);
                    }
                }
            });
        }, 2000);

        updateUI();
    </script>
</body>
</html>
