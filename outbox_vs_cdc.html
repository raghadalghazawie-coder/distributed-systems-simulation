<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكاة Outbox vs CDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-emerald-400">نمط Outbox مقابل CDC</h1>
        <p class="text-slate-400 mt-2">كيف تضمن اتساق البيانات في الأنظمة الموزعة؟</p>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Outbox -->
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4 text-cyan-400">نمط Outbox</h2>
            <p class="text-sm text-slate-300 mb-4">كتابة الحدث في جدول خاص داخل قاعدة البيانات أولاً لضمان الموثوقية.</p>
            <button onclick="runSim('Outbox')" class="w-full bg-cyan-700 py-2 rounded-lg">تشغيل محاكاة Outbox</button>
        </div>

        <!-- CDC -->
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4 text-amber-400">نمط CDC</h2>
            <p class="text-sm text-slate-300 mb-4">قراءة سجل العمليات (Log) مباشرة من قاعدة البيانات لنقل التغييرات فوراً.</p>
            <button onclick="runSim('CDC')" class="w-full bg-amber-700 py-2 rounded-lg">تشغيل محاكاة CDC</button>
        </div>
    </main>

    <div id="log" class="max-w-4xl mx-auto mt-6 bg-slate-900 p-4 rounded border border-slate-800 font-mono text-xs text-emerald-400 h-32 overflow-y-auto">
        [النظام] جاهز...
    </div>

    <script>
        function runSim(type) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            let msg = type === 'Outbox' 
                ? "Outbox: تم حفظ العملية في جدول الخروج ثم استخرجها الـ Message Relay."
                : "CDC: تم رصد تغيير في الـ WAL Log لقاعدة البيانات ونقل البيانات لحظياً.";
            log.innerHTML += `<div>[${time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
