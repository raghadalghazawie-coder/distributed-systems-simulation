<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحاكي الشامل لموازنة الأحمال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .server-card { transition: all 0.3s; }
        .active-load { transform: scale(1.05); border-color: #10b981; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-6 min-h-screen">
    <header class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-emerald-400 mb-2">محاكي موازنة الأحمال التفاعلي</h1>
        <p class="text-slate-400">اختر الخوارزمية لمراقبة كيفية توزيع الطلبات على السيرفرات ذات الأحمال المختلفة</p>
    </header>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- منطقة السيرفرات -->
        <div class="md:col-span-2 bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <div id="servers" class="grid grid-cols-3 gap-4 h-64 items-center">
                <!-- السيرفرات ستظهر هنا برمجياً -->
            </div>
            <div class="mt-6 flex justify-center gap-4">
                <button onclick="sendRequest()" class="bg-emerald-600 px-8 py-3 rounded-lg font-bold hover:bg-emerald-500 transition shadow-lg">إرسال طلب جديد</button>
                <button onclick="resetServers()" class="bg-slate-700 px-6 py-3 rounded-lg hover:bg-slate-600">إعادة تعيين</button>
            </div>
        </div>

        <!-- منطقة التحكم والشرح -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-4 text-blue-400">الخوارزميات</h2>
            <div class="space-y-3">
                <button onclick="setAlgo('RR')" class="w-full text-right p-3 bg-slate-800 rounded hover:bg-slate-700 border-l-4 border-blue-500">Round Robin (دوري)</button>
                <button onclick="setAlgo('LC')" class="w-full text-right p-3 bg-slate-800 rounded hover:bg-slate-700 border-l-4 border-yellow-500">Least Connections (أقل اتصال)</button>
                <button onclick="setAlgo('WRR')" class="w-full text-right p-3 bg-slate-800 rounded hover:bg-slate-700 border-l-4 border-purple-500">Weighted (موزون)</button>
            </div>
            <div id="explanation" class="mt-6 p-4 bg-slate-800 rounded-lg text-sm text-slate-300 italic">
                اختر خوارزمية للبدء...
            </div>
        </div>
    </div>

    <script>
        let servers = [
            { id: 1, load: 0, weight: 1 },
            { id: 2, load: 5, weight: 2 },
            { id: 3, load: 2, weight: 3 }
        ];
        let currentAlgo = 'RR';
        let rrPointer = 0;

        function renderServers() {
            const container = document.getElementById('servers');
            container.innerHTML = servers.map(s => `
                <div class="server-card border-2 p-4 rounded-xl text-center bg-slate-800 ${s.load > 5 ? 'border-red-500' : 'border-slate-600'}">
                    <div class="text-xs text-slate-400">سيرفر ${s.id}</div>
                    <div class="text-3xl font-bold my-2">${s.load}</div>
                    <div class="text-xs bg-slate-900 rounded px-2">وزن: ${s.weight}</div>
                </div>
            `).join('');
        }

        function setAlgo(algo) {
            currentAlgo = algo;
            const explanations = {
                'RR': 'يوزع الطلبات بالتساوي بالتناوب بغض النظر عن الحمل الحالي.',
                'LC': 'يفحص السيرفرات ويرسل الطلب للسيرفر ذو الحمل الأقل حالياً.',
                'WRR': 'يوزع الطلبات بناءً على قوة السيرفر (وزنه)؛ السيرفرات القوية تستقبل طلبات أكثر.'
            };
            document.getElementById('explanation').innerText = explanations[algo];
        }

        function sendRequest() {
            if(currentAlgo === 'RR') {
                servers[rrPointer].load++;
                rrPointer = (rrPointer + 1) % servers.length;
            } else if(currentAlgo === 'LC') {
                let minIdx = 0;
                servers.forEach((s, i) => { if(s.load < servers[minIdx].load) minIdx = i; });
                servers[minIdx].load++;
            } else if(currentAlgo === 'WRR') {
                // محاكاة بسيطة للوزن
                let target = servers.reduce((prev, curr) => (prev.load / prev.weight < curr.load / curr.weight ? prev : curr));
                servers[servers.indexOf(target)].load++;
            }
            renderServers();
        }

        function resetServers() {
            servers = [{id: 1, load: 0, weight: 1}, {id: 2, load: 5, weight: 2}, {id: 3, load: 2, weight: 3}];
            renderServers();
        }

        renderServers();
    </script>
</body>
</html>
