<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي Sticky Round-Robin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">
    <h1 class="text-2xl font-bold text-center text-emerald-400 mb-6">محاكي Sticky Round-Robin</h1>
    
    <div class="max-w-3xl mx-auto mb-8 bg-slate-900 p-6 rounded-xl border border-emerald-900">
        <label class="block text-sm mb-2 text-slate-400">أدخلي عنوان IP للمستخدم (مثال: 10.0.0.1):</label>
        <div class="flex gap-2">
            <input type="text" id="ipInput" placeholder="أدخل IP..." class="flex-1 bg-slate-800 p-2 rounded border border-slate-700">
            <button onclick="distributeSticky()" class="bg-emerald-600 px-6 py-2 rounded font-bold hover:bg-emerald-500">توجيه الطلب</button>
        </div>
    </div>

    <div class="max-w-3xl mx-auto grid grid-cols-4 gap-4 mb-8" id="server-grid"></div>

    <div id="log" class="max-w-3xl mx-auto bg-black p-4 rounded h-64 overflow-y-auto border border-slate-700 font-mono text-sm">
        <div class="text-slate-500">> سجل النظام جاهز...</div>
    </div>

    <script>
        const servers = [0, 0, 0, 0]; // أحمال السيرفرات
        const sessionTable = {}; // جدول ربط الـ IP بالسيرفر
        let rrPointer = 0; // مؤشر للـ Round Robin في حال كانت أول مرة

        function distributeSticky() {
            const ip = document.getElementById('ipInput').value.trim();
            if (!ip) return;

            let targetServer;

            if (sessionTable[ip] !== undefined) {
                // إذا كان المستخدم له جلسة موجودة
                targetServer = sessionTable[ip];
                log(`جلسة موجودة! إعادة توجيه ${ip} إلى سيرفر ${targetServer + 1}`);
            } else {
                // إذا كان مستخدم جديد، استخدم Round Robin
                targetServer = rrPointer;
                sessionTable[ip] = targetServer;
                log(`مستخدم جديد! تعيين ${ip} إلى سيرفر ${targetServer + 1}`);
                rrPointer = (rrPointer + 1) % servers.length;
            }

            servers[targetServer]++;
            renderServers();
        }

        function renderServers() {
            const grid = document.getElementById('server-grid');
            grid.innerHTML = servers.map((load, i) => `
                <div class="p-4 bg-slate-900 border border-emerald-900 rounded-lg text-center">
                    <div class="text-xs text-slate-500">سيرفر ${i + 1}</div>
                    <div class="text-2xl font-bold">${load}</div>
                </div>
            `).join('');
        }

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        renderServers();
    </script>
</body>
</html>
